name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Heal Gradle Wrapper
        run: |
          echo "Checking Gradle Wrapper..."
          mkdir -p gradle/wrapper

          curl -f -L \
            https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar \
            -o gradle/wrapper/gradle-wrapper.jar || \
          curl -f -L \
            https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar \
            -o gradle/wrapper/gradle-wrapper.jar

          chmod +x gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          mkdir -p app

          if [ -z "$SIGNING_KEY" ]; then
            echo "SIGNING_KEY secret is missing."
            exit 1
          fi

          echo "$SIGNING_KEY" | base64 -d > app/release.jks

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew clean assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
