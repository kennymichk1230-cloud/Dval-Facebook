name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Heal Gradle Wrapper (Fix corrupt or missing Jar)
        run: |
          echo "Checking and healing Gradle Wrapper..."
          mkdir -p gradle/wrapper
          
          # Attempt to download a pristine gradle-wrapper.jar from official Gradle sources.
          # We use curl with -f (fail) so that it returns a non-zero exit code if the URL 404s,
          # allowing the fallback to the master branch to execute correctly. This bypasses
          # any binary corruption from phone uploads or Git line-ending conversion issues.
          curl -f -sSL -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar" || \
          curl -f -sSL -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar"
          
          # Ensure execution permission for the Gradle wrapper script
          chmod +x gradlew

      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
